name: CI Pipeline

on:
  push:
    branches: [ '**' ]   # runs on all branches
  pull_request:
    branches: [ main ]
  workflow_dispatch:     # manual trigger

jobs:
  build-and-test:
    name: Build & Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    # run across 3 Python versions
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12' ]
      fail-fast: false
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || echo 'No requirements.txt, skipping'

      - name: Run app
        run: |
          chmod +x app.sh && ./app.sh

      - name: Run tests
        run: |
          chmod +x test.sh && ./test.sh

      - name: Print environment
        run: echo "Env is ${{ secrets.APP_ENV }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          # unique name for each matrix job to avoid override
          name: app-script-python-${{ matrix.python-version }}
          path: app.sh
          retention-days: 7
