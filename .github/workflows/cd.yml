name: CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target deployment environment'
        required: true
        default: 'staging'
        type: choice
        options: [ staging, production ]

jobs:
  # JOB 1: TEST
  
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12' ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt || echo 'No requirements.txt, skipping'
      - name: Run app
        run: chmod +x app.sh && ./app.sh
      - name: Run tests
        run: chmod +x test.sh && ./test.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-script-python-${{ matrix.python-version }}
          path: app.sh
          retention-days: 7

  # JOB 2: DEPLOY
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    # Links to the environment created in Step 1
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Deploy Information
        run: |
          echo "GitHub SHA: ${{ github.sha }}"
          echo "Actor Name: ${{ github.actor }}"
          echo "Timestamp: $(date -u)"
